<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Trace repository banner</title>
  <desc id="desc">A stylized banner with circuit traces, floating UI cards, and the Trace project title.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f" />
      <stop offset="45%" stop-color="#10243c" />
      <stop offset="100%" stop-color="#091726" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1d31" stop-opacity="0.96" />
      <stop offset="100%" stop-color="#132943" stop-opacity="0.86" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="50%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.26" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="82%" cy="72%" r="55%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#f97316" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#8fb6d5" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#020617" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)" rx="32" />
  <rect width="1280" height="640" fill="url(#glowA)" rx="32" />
  <rect width="1280" height="640" fill="url(#glowB)" rx="32" />
  <rect width="1280" height="640" fill="url(#grid)" rx="32" />

  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M58 122 H268 L312 166 H430" stroke="#38bdf8" stroke-opacity="0.46" stroke-width="4" />
    <path d="M82 496 H250 L306 440 H390" stroke="#22c55e" stroke-opacity="0.42" stroke-width="4" />
    <path d="M886 132 H1018 L1076 190 H1208" stroke="#f97316" stroke-opacity="0.42" stroke-width="4" />
    <path d="M876 492 H1016 L1060 448 H1210" stroke="#38bdf8" stroke-opacity="0.34" stroke-width="4" />
    <path d="M104 320 H260" stroke="#93c5fd" stroke-opacity="0.34" stroke-width="3" />
    <path d="M1016 320 H1176" stroke="#93c5fd" stroke-opacity="0.28" stroke-width="3" />
  </g>

  <g fill="#d7e6f5">
    <circle cx="58" cy="122" r="7" />
    <circle cx="82" cy="496" r="7" />
    <circle cx="1208" cy="190" r="7" />
    <circle cx="1210" cy="448" r="7" />
  </g>

  <g filter="url(#shadow)">
    <rect x="260" y="122" width="760" height="396" rx="28" fill="url(#panel)" stroke="#8cb3cf" stroke-opacity="0.18" />
    <rect x="290" y="154" width="278" height="150" rx="20" fill="#0b1829" stroke="#5d7f99" stroke-opacity="0.28" />
    <rect x="712" y="154" width="280" height="116" rx="20" fill="#0b1829" stroke="#5d7f99" stroke-opacity="0.28" />
    <rect x="712" y="292" width="280" height="150" rx="20" fill="#0b1829" stroke="#5d7f99" stroke-opacity="0.28" />
  </g>

  <g>
    <rect x="320" y="186" width="172" height="14" rx="7" fill="#1d3550" />
    <rect x="320" y="214" width="216" height="10" rx="5" fill="#274361" />
    <rect x="320" y="236" width="188" height="10" rx="5" fill="#274361" />
    <rect x="320" y="258" width="144" height="10" rx="5" fill="#274361" />

    <rect x="740" y="186" width="98" height="12" rx="6" fill="#1d3550" />
    <rect x="740" y="214" width="222" height="18" rx="9" fill="#102a45" />
    <rect x="740" y="246" width="178" height="10" rx="5" fill="#274361" />

    <rect x="740" y="324" width="210" height="12" rx="6" fill="#1d3550" />
    <rect x="740" y="352" width="220" height="14" rx="7" fill="#102a45" />
    <rect x="740" y="380" width="166" height="14" rx="7" fill="#102a45" />
    <rect x="740" y="408" width="192" height="14" rx="7" fill="#102a45" />
  </g>

  <g transform="translate(470 330)">
    <rect x="0" y="0" width="320" height="120" rx="24" fill="#091320" stroke="#d0e4f7" stroke-opacity="0.14" />
    <rect x="24" y="24" width="120" height="72" rx="18" fill="#0f2438" />
    <path d="M168 34 H292" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" />
    <path d="M168 60 H264" stroke="#4ea4d8" stroke-width="8" stroke-linecap="round" />
    <path d="M168 86 H236" stroke="#2dd4bf" stroke-width="8" stroke-linecap="round" />
    <path d="M40 60 C58 34, 78 90, 96 60 C112 34, 132 90, 148 60" stroke="url(#accent)" stroke-width="5" fill="none" />
  </g>

  <g font-family="Segoe UI, Fira Sans, Arial, sans-serif">
    <text x="640" y="218" fill="#f8fbff" font-size="108" font-weight="800" text-anchor="middle" letter-spacing="8">TRACE</text>
    <text x="640" y="268" fill="#9ec5e1" font-size="26" font-weight="600" text-anchor="middle" letter-spacing="2.8">COMPONENTS  •  ASSETS  •  SOURCING  •  PROJECTS</text>
    <text x="640" y="474" fill="#d6e4f2" font-size="24" font-weight="500" text-anchor="middle">Local-first desktop tooling for electronics inventory and project wrangling</text>
  </g>

  <g font-family="Segoe UI, Fira Sans, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="1.8">
    <text x="336" y="110" fill="#7dd3fc">inventory</text>
    <text x="932" y="110" fill="#fb923c">sourcing</text>
    <text x="302" y="548" fill="#4ade80">projects</text>
    <text x="930" y="548" fill="#7dd3fc">kicad</text>
  </g>
</svg>