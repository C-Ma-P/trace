name: Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend build
    runs-on: [self-hosted, Linux, X64]

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

  go:
    name: Go tests
    needs: frontend
    runs-on: [self-hosted, Linux, X64]
    environment: trace
    env:
      GOPRIVATE: github.com/C-Ma-P/*
      GONOSUMDB: github.com/C-Ma-P/*
      GOPROXY: https://proxy.golang.org,direct

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Require private modules token
        env:
          PRIVATE_MODULES_TOKEN: ${{ secrets.PRIVATE_MODULES_TOKEN }}
        run: |
          if [ -z "$PRIVATE_MODULES_TOKEN" ]; then
            echo "PRIVATE_MODULES_TOKEN is required to fetch private github.com/C-Ma-P modules."
            exit 1
          fi

      - name: Configure private module access
        env:
          PRIVATE_MODULES_TOKEN: ${{ secrets.PRIVATE_MODULES_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${PRIVATE_MODULES_TOKEN}@github.com/C-Ma-P/".insteadOf "https://github.com/C-Ma-P/"

      - name: Download Go modules
        run: go mod download

      - name: Run Go tests
        run: go test -v -mod=mod ./...