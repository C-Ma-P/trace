name: Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read
  actions: read

jobs:
  runner-check:
    name: Check self-hosted runner
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - name: Query runner availability
        id: check
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          available=$(gh api "repos/${{ github.repository }}/actions/runners" \
            --jq '.runners | map(select(
              .status == "online" and
              (.labels | map(.name) | contains(["self-hosted","Linux","X64"]))
            )) | length > 0') || available=false
          echo "available=$available" >> "$GITHUB_OUTPUT"

  frontend:
    name: Frontend build
    needs: runner-check
    if: always()
    runs-on: ${{ needs.runner-check.outputs.available == 'true' && fromJSON('["self-hosted","Linux","X64"]') || 'ubuntu-latest' }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

  go:
    name: Go tests
    needs: [runner-check, frontend]
    if: always() && needs.frontend.result == 'success'
    runs-on: ${{ needs.runner-check.outputs.available == 'true' && fromJSON('["self-hosted","Linux","X64"]') || 'ubuntu-latest' }}
    environment: trace
    env:
      GOPRIVATE: github.com/C-Ma-P/*
      GONOSUMDB: github.com/C-Ma-P/*
      GOPROXY: https://proxy.golang.org,direct

    steps:
      - name: Install system dependencies
        if: needs.runner-check.outputs.available != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev

      - name: Checkout
        uses: actions/checkout@v6

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: ${{ needs.runner-check.outputs.available != 'true' }}

      - name: Require private modules token
        env:
          PRIVATE_MODULES_TOKEN: ${{ secrets.PRIVATE_MODULES_TOKEN }}
        run: |
          if [ -z "$PRIVATE_MODULES_TOKEN" ]; then
            echo "PRIVATE_MODULES_TOKEN is required to fetch private github.com/C-Ma-P modules."
            exit 1
          fi

      - name: Configure private module access
        env:
          PRIVATE_MODULES_TOKEN: ${{ secrets.PRIVATE_MODULES_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${PRIVATE_MODULES_TOKEN}@github.com/C-Ma-P/".insteadOf "https://github.com/C-Ma-P/"

      - name: Run Go tests
        run: go test -v -mod=mod ./...